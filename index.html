<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atlantic Safe Co — Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
  :root {
    --navy:#0d1b2a; --navy-mid:#162032; --navy-light:#1e2f44;
    --gold:#c8922a; --gold-light:#e0a93a; --off-white:#faf9f5;
    --muted:#8a9bb0; --red:#c0392b; --green:#1e7a4e; --green-light:#27ae60;
    --border:rgba(200,146,42,0.2); --shadow:0 4px 24px rgba(0,0,0,0.35);
    --blue:#3498db; --purple:#9b59b6; --orange:#e67e22;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--off-white);min-height:100vh;}

  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);position:relative;overflow:hidden;}
  .login-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(200,146,42,0.12),transparent 70%);pointer-events:none;}
  .login-card{width:360px;background:var(--navy-mid);border:1px solid var(--border);border-radius:16px;padding:40px 36px;position:relative;z-index:1;}
  .login-logo{text-align:center;margin-bottom:32px;}
  .login-logo img{height:56px;border-radius:6px;}
  .login-logo h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold);margin-top:10px;}
  .login-logo p{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

  /* FORMS */
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .form-group input,.form-group select,.form-group textarea,
  .inp{width:100%;background:var(--navy-light);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:var(--off-white);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus,.inp:focus{border-color:var(--gold);}
  .form-group select option{background:var(--navy-mid);}
  .form-group textarea{resize:vertical;min-height:80px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .18s;}
  .btn-gold{background:var(--gold);color:var(--navy);}
  .btn-gold:hover{background:var(--gold-light);}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--off-white);}
  .btn-outline:hover{border-color:var(--gold);color:var(--gold);}
  .btn-danger{background:var(--red);color:#fff;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover{background:var(--green-light);}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-full{width:100%;justify-content:center;padding:12px;font-size:15px;}
  .error-msg{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.4);color:#ff6b6b;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;}

  /* SHELL */
  .app-shell{display:flex;min-height:100vh;}
  .sidebar{width:220px;background:var(--navy-mid);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
  .sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
  .sidebar-logo img{height:36px;border-radius:4px;}
  .sidebar-logo .site-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--gold);margin-top:6px;}
  .sidebar-role{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .nav-section{padding:8px 0;border-bottom:1px solid var(--border);}
  .nav-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 18px 4px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border-left:3px solid transparent;color:rgba(250,249,245,.7);}
  .nav-item:hover{background:rgba(200,146,42,.08);color:var(--off-white);}
  .nav-item.active{background:rgba(200,146,42,.12);border-left-color:var(--gold);color:var(--gold);}
  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .nav-badge{background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:auto;}
  .sidebar-footer{margin-top:auto;padding:16px 18px;border-top:1px solid var(--border);}
  .user-chip{display:flex;align-items:center;gap:10px;}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
  .user-name{font-size:13px;font-weight:500;}
  .user-role-text{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
  .main{flex:1;overflow:auto;}

  /* PAGE */
  .page-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--off-white);}
  .page-subtitle{font-size:13px;color:var(--muted);margin-top:2px;}
  .page-body{padding:20px 28px 40px;}

  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
  .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .stat-value{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);line-height:1.1;margin-top:4px;}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:2px;}

  /* JOB CARDS */
  .jobs-grid{display:flex;flex-direction:column;gap:10px;}
  .job-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .18s;display:grid;grid-template-columns:6px 1fr auto;gap:14px;align-items:center;}
  .job-card:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:var(--shadow);}
  .job-status-bar{width:6px;border-radius:4px;min-height:50px;}
  .job-info{min-width:0;}
  .job-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .job-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .job-customer{font-size:15px;font-weight:600;}
  .job-safe{font-size:12px;color:var(--muted);margin-top:2px;}
  .job-addr{font-size:12px;color:rgba(250,249,245,.6);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .job-meta{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--muted);flex-shrink:0;text-align:right;}
  .job-date{font-weight:500;color:var(--off-white);}

  /* BADGES */
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
  .badge-new{background:rgba(200,146,42,.2);color:var(--gold);}
  .badge-scheduled{background:rgba(52,152,219,.2);color:#5dade2;}
  .badge-enroute{background:rgba(243,156,18,.2);color:#f39c12;}
  .badge-onsite{background:rgba(155,89,182,.2);color:#bb8fce;}
  .badge-complete{background:rgba(39,174,96,.2);color:#27ae60;}
  .badge-invoiced{background:rgba(200,146,42,.25);color:var(--gold-light);}
  .badge-paid{background:rgba(39,174,96,.35);color:#58d68d;}
  .badge-urgent{background:rgba(192,57,43,.25);color:#e74c3c;}

  /* STATUS COLORS */
  .status-new{background:var(--gold);}
  .status-scheduled{background:#3498db;}
  .status-enroute{background:#f39c12;}
  .status-onsite{background:#9b59b6;}
  .status-complete{background:#27ae60;}
  .status-invoiced{background:var(--gold);}
  .status-paid{background:#1abc9c;}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow:auto;}
  .modal{background:var(--navy-mid);border:1px solid var(--border);border-radius:16px;width:100%;max-width:700px;padding:28px 30px;position:relative;}
  .modal-wide{max-width:900px;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1.5px;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;line-height:1;}
  .modal-close:hover{color:var(--off-white);}
  .section-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
  .section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}

  /* DETAIL */
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .detail-item label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px;}
  .detail-item span{font-size:14px;color:var(--off-white);}
  .notes-box{background:var(--navy-light);border-radius:8px;padding:12px 14px;font-size:13px;color:rgba(250,249,245,.8);line-height:1.5;}
  .pipeline{display:flex;align-items:center;margin:16px 0;overflow-x:auto;}
  .pipe-step-wrap{display:flex;flex-direction:column;align-items:center;flex:1;min-width:70px;}
  .pipe-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:var(--muted);cursor:pointer;transition:all .2s;}
  .pipe-dot.done{background:var(--gold);border-color:var(--gold);color:var(--navy);}
  .pipe-dot.active{background:var(--navy-light);border-color:var(--gold);color:var(--gold);box-shadow:0 0 0 3px rgba(200,146,42,.2);}
  .pipe-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);text-align:center;margin-top:4px;}
  .pipe-line{flex:1;height:2px;background:var(--border);margin:0 -4px;}
  .pipe-line.done{background:var(--gold);}

  /* PHOTO */
  .photo-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;}
  .photo-zone:hover{border-color:var(--gold);}
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:12px;}
  .photo-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;background:var(--navy-light);}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;}
  .photo-thumb .remove-photo{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  /* MAP */
  .map-container{border-radius:12px;overflow:hidden;border:1px solid var(--border);}
  #job-map{height:320px;width:100%;}
  .map-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
  .map-stat{background:var(--navy-light);border-radius:8px;padding:12px;text-align:center;}
  .map-stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);}
  .map-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

  /* MILEAGE */
  .mileage-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px;}
  .odometer-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:end;}
  .odo-val{font-family:'DM Mono',monospace;font-size:24px;color:var(--gold);letter-spacing:2px;}

  /* HOURS */
  .hours-table{width:100%;border-collapse:collapse;font-size:13px;}
  .hours-table th{background:var(--navy-light);color:var(--muted);padding:8px 12px;text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
  .hours-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);}
  .hours-table tr:last-child td{border-bottom:none;}
  .clock-btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .18s;}
  .clock-in{background:rgba(39,174,96,.2);color:#27ae60;border:1px solid rgba(39,174,96,.3);}
  .clock-in:hover{background:rgba(39,174,96,.35);}
  .clock-out{background:rgba(192,57,43,.2);color:#e74c3c;border:1px solid rgba(192,57,43,.3);}
  .clock-out:hover{background:rgba(192,57,43,.35);}
  .time-running{color:var(--gold);font-family:'DM Mono',monospace;font-size:12px;}

  /* MESSAGING */
  .msg-thread{display:flex;flex-direction:column;gap:10px;max-height:420px;overflow-y:auto;padding:4px 0 12px;}
  .msg-bubble{max-width:75%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;}
  .msg-crew{background:var(--navy-light);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px;}
  .msg-admin{background:rgba(200,146,42,.15);border:1px solid rgba(200,146,42,.3);align-self:flex-end;border-bottom-right-radius:4px;}
  .msg-meta{font-size:10px;color:var(--muted);margin-bottom:4px;}
  .msg-type-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;}
  .msg-note{background:rgba(52,152,219,.15);color:#5dade2;}
  .msg-change-order{background:rgba(230,126,34,.15);color:#e67e22;}
  .msg-charge{background:rgba(192,57,43,.15);color:#e74c3c;}
  .msg-general{background:rgba(255,255,255,.06);color:var(--muted);}
  .msg-input-row{display:flex;gap:8px;margin-top:12px;align-items:flex-end;}
  .msg-type-select{background:var(--navy-light);border:1px solid var(--border);border-radius:8px;color:var(--off-white);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;outline:none;flex-shrink:0;}
  .msg-textarea{flex:1;background:var(--navy-light);border:1px solid var(--border);border-radius:8px;color:var(--off-white);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;outline:none;resize:none;min-height:44px;max-height:100px;}
  .msg-textarea:focus{border-color:var(--gold);}
  .unread-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;margin-left:6px;vertical-align:middle;}

  /* CHANGE ORDER */
  .co-card{background:var(--navy-light);border-left:3px solid var(--orange);border-radius:8px;padding:12px 14px;margin-bottom:8px;}
  .co-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .co-title{font-size:13px;font-weight:600;}
  .co-amount{font-size:14px;font-weight:700;color:var(--gold);}
  .co-desc{font-size:12px;color:var(--muted);line-height:1.5;}

  /* INVOICE */
  .invoice-line{display:grid;grid-template-columns:1fr 80px 100px 30px;gap:10px;align-items:center;margin-bottom:8px;}
  .invoice-total{display:flex;justify-content:flex-end;padding-top:12px;font-size:18px;font-weight:700;color:var(--gold);}
  .invoice-preview{background:var(--off-white);color:#141413;border-radius:12px;padding:28px 32px;}
  .inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;}
  .inv-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--navy);}
  .inv-meta{font-size:12px;color:#555;text-align:right;line-height:1.7;}
  .inv-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px;}
  .inv-table th{background:var(--navy);color:var(--off-white);padding:8px 12px;text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;}
  .inv-table td{padding:8px 12px;border-bottom:1px solid #e5e0d8;}
  .inv-footer{margin-top:20px;font-size:11px;color:#888;text-align:center;}

  /* CALENDAR */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-day-header{text-align:center;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:6px 0;}
  .cal-cell{background:var(--navy-mid);border:1px solid var(--border);border-radius:8px;min-height:80px;padding:8px;}
  .cal-cell.today{border-color:var(--gold);}
  .cal-cell.other-month{opacity:.4;}
  .cal-date{font-size:12px;font-weight:600;margin-bottom:4px;}
  .cal-job-dot{background:rgba(200,146,42,.3);border-left:2px solid var(--gold);border-radius:3px;padding:2px 5px;font-size:10px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
  .cal-job-dot:hover{background:rgba(200,146,42,.5);}

  /* CREW */
  .crew-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;}
  .crew-avatar-lg{width:44px;height:44px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex-shrink:0;}

  /* CREW VIEW */
  .crew-job-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:14px;}
  .status-btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  .status-btn{padding:9px 16px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;border:2px solid transparent;transition:all .18s;}
  .status-btn.active-status{border-color:var(--gold);background:rgba(200,146,42,.15);color:var(--gold);}
  .status-btn:not(.active-status){background:var(--navy-light);color:var(--muted);}
  .status-btn:hover:not(.active-status){border-color:rgba(200,146,42,.3);color:var(--off-white);}

  /* TABS */
  .tabs{display:flex;gap:2px;background:var(--navy-light);border-radius:10px;padding:3px;width:fit-content;margin-bottom:20px;}
  .tab{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;}
  .tab.active{background:var(--gold);color:var(--navy);}

  /* TOOLBAR */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .search-input{background:var(--navy-mid);border:1px solid var(--border);border-radius:8px;color:var(--off-white);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 14px;outline:none;width:220px;}
  .search-input:focus{border-color:var(--gold);}
  .filter-chip{padding:6px 13px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;}
  .filter-chip.active{background:rgba(200,146,42,.2);border-color:var(--gold);color:var(--gold);}

  /* TOAST */
  .toast{position:fixed;bottom:28px;right:28px;background:var(--navy-mid);border:1px solid var(--gold);border-radius:10px;padding:13px 20px;font-size:13px;color:var(--off-white);z-index:999;box-shadow:var(--shadow);animation:slideUp .3s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  /* EMPTY */
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-icon{font-size:48px;margin-bottom:14px;opacity:.5;}
  .empty-state h3{font-size:16px;font-weight:500;margin-bottom:6px;color:var(--off-white);}

  /* MAPBOX OVERRIDES */
  .mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib{opacity:.4;}

  @media(max-width:768px){
    .sidebar{width:56px;}
    .sidebar-logo .site-name,.nav-label,.nav-item span,.sidebar-footer .user-name,.sidebar-footer .user-role-text{display:none;}
    .nav-item{padding:12px;justify-content:center;}
    .stats-row{grid-template-columns:1fr 1fr;}
    .form-row,.form-row-3{grid-template-columns:1fr;}
    .page-header{padding:16px 16px 0;}

async function sendInvoiceEmail({ job, lines }) {

  try {
    const approvedCOs = (job.changeOrders||[]).filter(co=>co.status==='approved');
    const lineItemsText = lines.map(l=>`• ${l.desc} (x${l.qty}) — $${Number((l.qty||0)*(l.price||0)).toFixed(2)}`).join('\n');
    const coText = approvedCOs.length > 0 ? approvedCOs.map(co=>`• Change Order: ${co.desc} — $${Number(co.amount).toFixed(2)}`).join('\n') : '';
    const total = lines.reduce((s,l)=>s+(l.qty||0)*(l.price||0),0) + approvedCOs.reduce((s,co)=>s+co.amount,0);
    const allLines = lineItemsText + (coText ? '\n' + coText : '');
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email:      job.email,
      to_name:       job.customer,
      from_name:     'Atlantic Safe Company',
      job_id:        job.id,
      customer:      job.customer,
      msg_type:      'Invoice',
      invoice_date:  new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),
      delivery_addr: job.deliveryAddr,
      invoice_lines: allLines,
      total:         '$' + Number(total).toFixed(2),
      message:       allLines,
      extra_charge:  'N/A',
      subject:       `Invoice from Atlantic Safe Co — Job ${job.id}`
    }, EMAILJS_PUBLIC_KEY);
    return true;
  } catch(e) { console.warn('Invoice email error:', e); return false; }
}

// ── GEOCODE HELPER ──
async function geocodeAddress(address) {
  try {
    const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(address)}.json?access_token=${MAPBOX_TOKEN}&country=US&proximity=${BASE_LOCATION.coords.join(',')}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.features && data.features.length > 0) return data.features[0].center;
  } catch (e) {}
  return null;
}

// ── MAP COMPONENT ──
function JobMap({jobs, selectedJobId}) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const [resolvedJobs, setResolvedJobs] = useState(jobs);

  useEffect(() => {
    // Geocode any jobs missing coords
    async function resolveCoords() {
      const updated = await Promise.all(jobs.map(async j => {
        if (j.deliveryCoords) return j;
        if (!j.deliveryAddr) return j;
        const coords = await geocodeAddress(j.deliveryAddr);
        return coords ? { ...j, deliveryCoords: coords } : j;
      }));
      setResolvedJobs(updated);
    }
    resolveCoords();
  }, [jobs.map(j => j.id + j.deliveryAddr).join(',')]);

  useEffect(() => {
    if (!mapRef.current) return;
    if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; }

    mapboxgl.accessToken = MAPBOX_TOKEN;

    const map = new mapboxgl.Map({
      container: mapRef.current,
      style: 'mapbox://styles/mapbox/dark-v11',
      center: BASE_LOCATION.coords,
      zoom: 10
    });

    mapInstanceRef.current = map;

    map.on('load', () => {
      map.addControl(new mapboxgl.NavigationControl(), 'top-right');

      // Base marker — gold house pin
      const baseEl = document.createElement('div');
      baseEl.style.cssText = 'width:32px;height:32px;border-radius:50%;background:#c8922a;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5);';
      baseEl.textContent = '🏠';
      new mapboxgl.Marker({ element: baseEl })
        .setLngLat(BASE_LOCATION.coords)
        .setPopup(new mapboxgl.Popup({ offset: 20 }).setHTML('<div style="font-size:12px;font-weight:700;color:#141413;">Base — 4920 Christensen Rd<br>Ft. Pierce, FL 34981</div>'))
        .addTo(map);

      const jobsWithCoords = resolvedJobs.filter(j => j.deliveryCoords);
      const allCoords = [BASE_LOCATION.coords, ...jobsWithCoords.map(j => j.deliveryCoords)];

      // Numbered job stop markers
      jobsWithCoords.forEach((j, i) => {
        const isSelected = j.id === selectedJobId;
        const el = document.createElement('div');
        el.style.cssText = `width:30px;height:30px;border-radius:50%;background:${isSelected ? '#c8922a' : '#3498db'};border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4);`;
        el.textContent = i + 1;
        new mapboxgl.Marker({ element: el })
          .setLngLat(j.deliveryCoords)
          .setPopup(new mapboxgl.Popup({ offset: 20 }).setHTML(
            `<div style="font-size:12px;color:#141413;line-height:1.6;">
              <strong>${j.id}</strong> — <span class="badge">${j.status}</span><br>
              <strong>${j.customer}</strong><br>
              📍 ${j.deliveryAddr}<br>
              🔒 ${j.safeType || 'Safe'}${j.weight ? ' · ' + j.weight : ''}
              ${j.estimatedMiles ? '<br>~' + j.estimatedMiles + ' mi from base' : ''}
            </div>`
          ))
          .addTo(map);
      });

      // Dashed gold route line: base → stop 1 → stop 2 → ...
      if (jobsWithCoords.length > 0) {
        map.addSource('route', {
          type: 'geojson',
          data: { type: 'Feature', geometry: { type: 'LineString', coordinates: allCoords } }
        });
        map.addLayer({
          id: 'route-line',
          type: 'line',
          source: 'route',
          paint: { 'line-color': '#c8922a', 'line-width': 2.5, 'line-dasharray': [3, 3], 'line-opacity': 0.8 }
        });
      }

      // Fit map to all points
      if (allCoords.length > 1) {
        const bounds = allCoords.reduce((b, c) => b.extend(c), new mapboxgl.LngLatBounds(allCoords[0], allCoords[0]));
        map.fitBounds(bounds, { padding: 70 });
      }
    });

    return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
  }, [resolvedJobs.map(j => j.id + (j.deliveryCoords || '')).join(','), selectedJobId]);

  return React.createElement('div', { className: 'map-container' },
    React.createElement('div', { ref: mapRef, style: { height: '320px', width: '100%' } })
  );
}

// ── MAIN APP ──
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('jobs');
  const [jobs,setJobs]=useState(loadJobs);
  const [mileageLog,setMileageLog]=useState(loadMileage);
  const [toast,setToast]=useState(null);
  const [syncStatus,setSyncStatus]=useState(SHEETS_READY()?'syncing':'local');

  // Load from Google Sheets on startup
  useEffect(()=>{
    if(!SHEETS_READY()) return;
    setSyncStatus('syncing');
    loadJobsRemote().then(remoteJobs=>{
      if(remoteJobs) setJobs(remoteJobs);
      return loadMileageRemote();
    }).then(remoteMileage=>{
      if(remoteMileage) setMileageLog(remoteMileage);
      setSyncStatus('synced');
    }).catch(()=>setSyncStatus('error'));
  },[]);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),2800);}
  function logout(){setUser(null);setPage('jobs');}

  if(!user)return React.createElement(Login,{onLogin:(u)=>{setUser(u);setPage('jobs');}});
  const isAdmin=user.role==='admin';
  if(!isAdmin)return React.createElement(CrewView,{jobs,setJobs,currentUser:user,showToast,mileageLog,setMileageLog});
  const totalUnread=jobs.reduce((s,j)=>s+(j.messages||[]).filter(m=>!m.isAdmin&&!m.read).length,0);

  const adminNav=[

        React.createElement('div',{className:'site-name'},'Dispatch'),
        React.createElement('div',{className:'sidebar-role'},'Admin Panel')

        adminNav.map(n=>React.createElement('div',{key:n.id,className:'nav-item'+(page===n.id?' active':''),onClick:()=>setPage(n.id)},
          React.createElement('span',{className:'nav-icon'},n.icon),
          React.createElement('span',null,n.label),
          n.badge>0&&React.createElement('span',{className:'nav-badge'},n.badge)
        ))
      ),
      React.createElement('div',{className:'sidebar-footer'},
        React.createElement('div',{style:{fontSize:'10px',marginBottom:'10px',display:'flex',alignItems:'center',gap:'6px',color:syncStatus==='synced'?'#27ae60':syncStatus==='error'?'#e74c3c':'var(--muted)'}},
          React.createElement('span',null,syncStatus==='synced'?'●':syncStatus==='error'?'●':'○'),
